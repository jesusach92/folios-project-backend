version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: production_control_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: production_control
      MYSQL_USER: produser
      MYSQL_PASSWORD: prodpass123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./DATABASE_SCHEMA.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  mysql_data:
    driver: local
